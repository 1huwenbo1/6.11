<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="河南文旅互动网页作品集，以国风青铜文化视觉展示少林寺、白马寺、龙门石窟、开封府、河南博物院和洛邑古城。" />
  <meta name="theme-color" content="#111f21" />
  <title>豫见青铜 | 河南文旅互动作品集</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="preload" href="assets/optimized/mascot.png" as="image" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    :root {
      --ink: #101411;
      --deep: #111f21;
      --bronze: #b98037;
      --gold: #f4cf65;
      --patina: #2f9a91;
      --jade: #9fcf9d;
      --paper: #f8efd7;
      --vermilion: #b74636;
      --line: rgba(244, 207, 101, 0.38);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--paper);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
      background:
        radial-gradient(circle at 16% 12%, rgba(47, 154, 145, 0.22), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(244, 207, 101, 0.13), transparent 24%),
        linear-gradient(145deg, #0b0f0f 0%, #142425 48%, #0a0c0b 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image:
        linear-gradient(30deg, transparent 46%, rgba(244, 207, 101, 0.28) 48%, transparent 50%),
        linear-gradient(150deg, transparent 46%, rgba(47, 154, 145, 0.28) 48%, transparent 50%);
      background-size: 92px 92px;
      mask-image: linear-gradient(to bottom, black, transparent 85%);
    }

    .page {
      width: min(1180px, calc(100% - 36px));
      margin: 0 auto;
      padding: 36px 0 64px;
      position: relative;
    }

    .hero {
      min-height: 88vh;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(260px, 0.72fr);
      align-items: center;
      gap: 34px;
      position: relative;
    }

    .seal {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--gold);
      letter-spacing: 0;
      font-weight: 700;
      border: 1px solid var(--line);
      padding: 8px 14px;
      background: rgba(15, 26, 26, 0.72);
      box-shadow: inset 0 0 0 1px rgba(47, 154, 145, 0.18);
    }

    .seal-mark {
      width: 18px;
      height: 18px;
      border: 2px solid var(--bronze);
      display: grid;
      place-items: center;
      transform: rotate(45deg);
    }

    .seal-mark::after {
      content: "";
      width: 6px;
      height: 6px;
      background: var(--patina);
      display: block;
    }

    h1 {
      margin: 26px 0 18px;
      font-family: "STKaiti", "KaiTi", "Songti SC", serif;
      font-size: clamp(44px, 8vw, 104px);
      line-height: 0.96;
      letter-spacing: 0;
      color: #fff7dc;
      text-shadow: 0 8px 0 rgba(185, 128, 55, 0.12), 0 0 32px rgba(244, 207, 101, 0.16);
    }

    .hero-copy {
      max-width: 700px;
      color: rgba(248, 239, 215, 0.82);
      font-size: clamp(16px, 2vw, 20px);
      line-height: 1.85;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 30px;
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(244, 207, 101, 0.58);
      color: #1b1810;
      background: linear-gradient(135deg, #f7d76f, #b98037);
      padding: 12px 20px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      transition: transform 0.24s ease, filter 0.24s ease;
    }

    .btn.secondary {
      color: var(--paper);
      background: rgba(47, 154, 145, 0.16);
      border-color: rgba(47, 154, 145, 0.58);
    }

    .btn:hover {
      transform: translateY(-3px);
      filter: brightness(1.08);
    }

    .mascot-wrap {
      min-height: 560px;
      position: relative;
      display: grid;
      place-items: center;
    }

    .bronze-ring {
      position: absolute;
      width: min(430px, 78vw);
      aspect-ratio: 1;
      border: 1px solid rgba(244, 207, 101, 0.34);
      border-radius: 50%;
      background:
        conic-gradient(from 0deg, transparent 0 12%, rgba(244, 207, 101, 0.22) 12% 14%, transparent 14% 28%, rgba(47, 154, 145, 0.18) 28% 31%, transparent 31% 100%);
      box-shadow: inset 0 0 70px rgba(47, 154, 145, 0.16), 0 0 90px rgba(244, 207, 101, 0.08);
    }

    .mascot {
      width: min(420px, 78vw);
      max-height: 72vh;
      object-fit: contain;
      filter: drop-shadow(0 28px 36px rgba(0, 0, 0, 0.55));
      position: relative;
      z-index: 1;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin: 8px 0 24px;
      border-top: 1px solid var(--line);
      padding-top: 30px;
    }

    .section-head h2 {
      margin: 0;
      font-family: "STKaiti", "KaiTi", "Songti SC", serif;
      font-size: clamp(30px, 4vw, 54px);
      color: #fff2bd;
      letter-spacing: 0;
    }

    .section-head p {
      margin: 0;
      max-width: 430px;
      color: rgba(248, 239, 215, 0.72);
      line-height: 1.7;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
    }

    .spot-card {
      position: relative;
      min-height: 340px;
      appearance: none;
      color: inherit;
      font: inherit;
      text-align: left;
      border: 1px solid rgba(244, 207, 101, 0.28);
      background:
        linear-gradient(180deg, rgba(21, 36, 37, 0.96), rgba(12, 15, 14, 0.96)),
        var(--deep);
      box-shadow: var(--shadow);
      overflow: hidden;
      cursor: pointer;
      padding: 18px;
      isolation: isolate;
    }

    .spot-card:focus-visible,
    .btn:focus-visible,
    .close:focus-visible {
      outline: 3px solid rgba(244, 207, 101, 0.86);
      outline-offset: 4px;
    }

    .spot-card::before,
    .spot-card::after {
      content: "";
      position: absolute;
      width: 54px;
      height: 54px;
      border-color: rgba(244, 207, 101, 0.62);
      border-style: solid;
      z-index: 3;
    }

    .spot-card::before {
      left: 10px;
      top: 10px;
      border-width: 2px 0 0 2px;
    }

    .spot-card::after {
      right: 10px;
      bottom: 10px;
      border-width: 0 2px 2px 0;
    }

    .image-stage {
      width: 100%;
      height: 236px;
      background: transparent;
      border: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      contain: layout paint;
    }

    .spot-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transform-origin: center;
    }

    .spot-meta {
      padding-top: 16px;
      display: grid;
      gap: 8px;
    }

    .spot-meta span {
      color: var(--gold);
      font-size: 13px;
      font-weight: 800;
    }

    .spot-meta h3 {
      margin: 0;
      color: #fff7dc;
      font-family: "STKaiti", "KaiTi", "Songti SC", serif;
      font-size: 28px;
      letter-spacing: 0;
    }

    .spot-meta p {
      margin: 0;
      color: rgba(248, 239, 215, 0.68);
      line-height: 1.55;
      font-size: 14px;
    }

    .spot-card .glint {
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 0 38%, rgba(244, 207, 101, 0.18) 45%, transparent 54%);
      transform: translateX(-120%);
      z-index: 2;
      pointer-events: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 22px;
    }

    .modal.is-open {
      display: grid;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(1, 3, 3, 0.76);
      backdrop-filter: blur(8px);
    }

    .modal-panel {
      width: min(940px, 100%);
      max-height: min(760px, calc(100vh - 44px));
      overflow: auto;
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.86fr);
      gap: 0;
      border: 1px solid rgba(244, 207, 101, 0.58);
      background:
        linear-gradient(135deg, rgba(248, 239, 215, 0.97), rgba(236, 219, 176, 0.98));
      color: #251b12;
      box-shadow: 0 40px 120px rgba(0, 0, 0, 0.58);
    }

    .modal-art {
      min-height: 430px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, rgba(47, 154, 145, 0.2), transparent 54%),
        #040606;
      padding: 22px;
    }

    .modal-art img {
      width: 100%;
      max-height: 520px;
      object-fit: contain;
      filter: drop-shadow(0 20px 28px rgba(0, 0, 0, 0.45));
    }

    .modal-copy {
      padding: clamp(24px, 4vw, 42px);
      position: relative;
    }

    .modal-copy::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(185, 128, 55, 0.34);
      pointer-events: none;
    }

    .close {
      position: absolute;
      right: 16px;
      top: 14px;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(185, 128, 55, 0.48);
      background: rgba(255, 255, 255, 0.34);
      color: #251b12;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      z-index: 2;
    }

    .modal-kicker {
      display: inline-block;
      margin-bottom: 14px;
      color: #0f766f;
      font-weight: 900;
    }

    .modal-copy h3 {
      margin: 0 44px 16px 0;
      font-family: "STKaiti", "KaiTi", "Songti SC", serif;
      font-size: clamp(34px, 5vw, 56px);
      color: #4a2a11;
      letter-spacing: 0;
    }

    .modal-copy p {
      margin: 0 0 18px;
      line-height: 1.9;
      color: rgba(37, 27, 18, 0.78);
      font-size: 16px;
    }

    .facts {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .fact {
      border: 1px solid rgba(185, 128, 55, 0.42);
      color: #4a2a11;
      background: rgba(255, 248, 222, 0.62);
      padding: 8px 12px;
      font-weight: 800;
      font-size: 13px;
    }

    .footer {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid rgba(244, 207, 101, 0.22);
      color: rgba(248, 239, 215, 0.62);
      text-align: center;
      line-height: 1.7;
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        min-height: auto;
        padding-top: 34px;
      }

      .mascot-wrap {
        min-height: 420px;
      }

      .gallery {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .modal-panel {
        grid-template-columns: 1fr;
      }

      .modal-art {
        min-height: 320px;
      }
    }

    @media (max-width: 620px) {
      .page {
        width: min(100% - 24px, 1180px);
        padding-bottom: 42px;
      }

      .section-head {
        display: block;
      }

      .section-head p {
        margin-top: 10px;
      }

      .gallery {
        grid-template-columns: 1fr;
      }

      .spot-card {
        min-height: 300px;
        padding: 14px;
      }

      .image-stage {
        height: 210px;
      }

      .hero-actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
      }

      .spot-card,
      .spot-image,
      .btn {
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="河南文旅互动作品集封面">
      <div class="hero-text">
        <div class="seal"><i class="seal-mark" aria-hidden="true"></i>河南文旅互动网页作品集</div>
        <h1>豫见青铜<br />山河入画</h1>
        <p class="hero-copy">
          以青铜器的鎏金、绿锈、纹样为视觉语言，把少林寺、白马寺、龙门石窟、开封府等河南文化地标做成可点击的插画展厅。点击任意景区卡片，开启一页沉浸式介绍。
        </p>
        <div class="hero-actions">
          <button class="btn" data-scroll-gallery>进入展厅</button>
          <button class="btn secondary" data-open-random>随机点亮一处河南</button>
        </div>
      </div>
      <div class="mascot-wrap" aria-hidden="true">
        <div class="bronze-ring"></div>
        <img class="mascot" src="assets/optimized/mascot.png" alt="" fetchpriority="high" decoding="async" />
      </div>
    </section>

    <section class="spots" id="gallery" aria-label="景区插画网格">
      <div class="section-head">
        <h2>中原六景</h2>
        <p>青铜色系承接历史厚度，插画卡片保留年轻化表达。每张卡片都可点击查看景区故事、文化关键词与互动介绍。</p>
      </div>
      <div class="gallery" id="spotGrid"></div>
    </section>

    <footer class="footer">
      青铜纹样、国风建筑与河南地标的互动视觉实验 | 单 HTML 文件作品
    </footer>
  </main>

  <div class="modal" id="spotModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-backdrop" data-close-modal></div>
    <article class="modal-panel">
      <div class="modal-art">
        <img id="modalImage" src="" alt="" />
      </div>
      <div class="modal-copy">
        <button class="close" type="button" aria-label="关闭弹窗" data-close-modal>×</button>
        <span class="modal-kicker" id="modalKicker"></span>
        <h3 id="modalTitle"></h3>
        <p id="modalDesc"></p>
        <p id="modalStory"></p>
        <div class="facts" id="modalFacts"></div>
      </div>
    </article>
  </div>

  <script>
    const scenicSpots = [
      {
        name: "少林寺",
        city: "郑州 登封",
        tag: "禅武祖庭",
        preview: "assets/preview/shaolin.jpg",
        image: "assets/optimized/shaolin.png",
        desc: "嵩山深处的少林寺，是禅宗文化、武术精神与中原山岳气象交汇的代表性地标。",
        story: "页面以殿门、兽纹和青铜绿为视觉锚点，表现“山门一开，拳风入画”的互动感。适合作为河南文旅作品集中的精神入口。",
        facts: ["嵩山", "禅宗", "少林功夫"]
      },
      {
        name: "白马寺",
        city: "洛阳",
        tag: "释源祖庭",
        preview: "assets/preview/baimasi.jpg",
        image: "assets/optimized/baimasi.png",
        desc: "白马寺被称为中国第一古刹，承载了丝路传播、汉魏洛阳与东方佛教艺术的开端记忆。",
        story: "插画中的白马与红墙形成强识别符号，点击弹窗时以卷轴展开的节奏呈现，像翻开一页洛阳旧事。",
        facts: ["中国第一古刹", "洛阳", "白马传经"]
      },
      {
        name: "龙门石窟",
        city: "洛阳",
        tag: "石刻长卷",
        preview: "assets/preview/longmen.jpg",
        image: "assets/optimized/longmen.png",
        cardScale: 0.86,
        desc: "伊水两岸的龙门石窟，以恢宏造像和精密雕刻构成一部立体的中原艺术史。",
        story: "这里用金色屋檐和石桥层次呼应石窟的庄严感，弹窗介绍突出“石壁为卷、河山为轴”的视觉叙事。",
        facts: ["世界文化遗产", "伊河", "石刻艺术"]
      },
      {
        name: "开封府",
        city: "开封",
        tag: "宋韵府衙",
        preview: "assets/preview/kaifengfu.jpg",
        image: "assets/optimized/kaifengfu.png",
        desc: "开封府连接北宋都城记忆与民间传说，府门、仪仗与市井烟火共同构成宋韵场景。",
        story: "卡片采用规整中轴构图，像一枚铜印落在页面中。点击后弹窗强化“府门开启”的仪式感。",
        facts: ["北宋东京", "包公文化", "府衙建筑"]
      },
      {
        name: "河南博物院",
        city: "郑州",
        tag: "文明宝库",
        preview: "assets/preview/museum.jpg",
        image: "assets/optimized/museum.png",
        desc: "河南博物院汇聚中原文明的重要器物，是读懂青铜礼器、玉器与华夏源流的关键窗口。",
        story: "作为本页青铜主题的文化核心，它用沉稳的建筑轮廓承接器物之美，让作品集从旅游延展到文明叙事。",
        facts: ["青铜器", "中原文明", "文物展陈"]
      },
      {
        name: "洛邑古城",
        city: "洛阳",
        tag: "古城夜游",
        preview: "assets/preview/luoyi.jpg",
        image: "assets/optimized/luoyi.png",
        desc: "洛邑古城融合古建、灯会、汉服与夜游消费，是年轻游客感受洛阳古都气质的热门场景。",
        story: "灯笼与城楼让画面更具节庆感，适合作为作品集的收束页面，表达“历史可游、文化可玩”。",
        facts: ["古都洛阳", "汉服打卡", "夜游"]
      }
    ];

    const grid = document.querySelector("#spotGrid");
    const modal = document.querySelector("#spotModal");
    const modalImage = document.querySelector("#modalImage");
    const modalKicker = document.querySelector("#modalKicker");
    const modalTitle = document.querySelector("#modalTitle");
    const modalDesc = document.querySelector("#modalDesc");
    const modalStory = document.querySelector("#modalStory");
    const modalFacts = document.querySelector("#modalFacts");
    let activeCard = null;

    const motion = window.gsap || {
      set: () => {},
      to: (target, vars = {}) => {
        if (typeof vars.onComplete === "function") vars.onComplete();
      },
      from: () => {},
      fromTo: (target, fromVars, toVars = {}) => {
        if (typeof toVars.onComplete === "function") toVars.onComplete();
      },
      timeline: () => ({
        from() { return this; },
        to() { return this; },
        fromTo() { return this; }
      })
    };

    function createCard(spot, index) {
      const card = document.createElement("button");
      card.className = "spot-card";
      card.type = "button";
      card.setAttribute("aria-label", `查看${spot.name}介绍`);
      card.innerHTML = `
        <span class="glint"></span>
        <span class="image-stage">
          <img class="spot-image" src="${spot.preview}" alt="${spot.name}插画" loading="lazy" decoding="async" />
        </span>
        <div class="spot-meta">
          <span>${String(index + 1).padStart(2, "0")} · ${spot.city} · ${spot.tag}</span>
          <h3>${spot.name}</h3>
          <p>${spot.desc}</p>
        </div>
      `;
      const image = card.querySelector(".spot-image");
      const cardScale = spot.cardScale || 1;
      motion.set(image, { scale: cardScale });

      card.addEventListener("mouseenter", () => {
        motion.to(image, { scale: cardScale * 1.06, duration: 0.45, ease: "power3.out" });
        motion.fromTo(card.querySelector(".glint"), { xPercent: -120 }, { xPercent: 120, duration: 0.78, ease: "power2.out" });
      });

      card.addEventListener("mouseleave", () => {
        motion.to(image, { scale: cardScale, duration: 0.45, ease: "power3.out" });
      });

      card.addEventListener("click", () => openModal(spot, card));
      return card;
    }

    function renderGallery() {
      scenicSpots.forEach((spot, index) => {
        grid.appendChild(createCard(spot, index));
      });
    }

    function openModal(spot, card) {
      activeCard = card;
      modalImage.src = spot.image;
      modalImage.alt = `${spot.name}插画`;
      modalKicker.textContent = `${spot.city} · ${spot.tag}`;
      modalTitle.textContent = spot.name;
      modalDesc.textContent = spot.desc;
      modalStory.textContent = spot.story;
      modalFacts.innerHTML = spot.facts.map((fact) => `<span class="fact">${fact}</span>`).join("");

      modal.classList.add("is-open");
      document.body.style.overflow = "hidden";

      const timeline = motion.timeline();
      timeline
        .fromTo(".modal-backdrop", { opacity: 0 }, { opacity: 1, duration: 0.22, ease: "power2.out" })
        .fromTo(".modal-panel", { opacity: 0, y: 36, scale: 0.94 }, { opacity: 1, y: 0, scale: 1, duration: 0.44, ease: "back.out(1.4)" }, "-=0.05")
        .fromTo("#modalImage", { opacity: 0, scale: 0.86, rotate: -2 }, { opacity: 1, scale: 1, rotate: 0, duration: 0.52, ease: "power3.out" }, "-=0.22")
        .fromTo(".modal-kicker, .modal-copy h3, .modal-copy p, .fact", { opacity: 0, y: 18 }, { opacity: 1, y: 0, stagger: 0.055, duration: 0.32, ease: "power2.out" }, "-=0.22");
    }

    function closeModal() {
      if (!modal.classList.contains("is-open")) return;
      motion.to(".modal-panel", {
        opacity: 0,
        y: 22,
        scale: 0.96,
        duration: 0.22,
        ease: "power2.in",
        onComplete: () => {
          modal.classList.remove("is-open");
          document.body.style.overflow = "";
          motion.set([".modal-panel", ".modal-backdrop"], { clearProps: "all" });
          if (activeCard) activeCard.focus();
        }
      });
      motion.to(".modal-backdrop", { opacity: 0, duration: 0.22, ease: "power2.in" });
    }

    renderGallery();

    document.querySelectorAll("[data-close-modal]").forEach((item) => {
      item.addEventListener("click", closeModal);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeModal();
    });

    document.querySelector("[data-scroll-gallery]").addEventListener("click", () => {
      document.querySelector("#gallery").scrollIntoView({ behavior: "smooth", block: "start" });
    });

    document.querySelector("[data-open-random]").addEventListener("click", () => {
      const cards = Array.from(document.querySelectorAll(".spot-card"));
      const randomIndex = Math.floor(Math.random() * scenicSpots.length);
      openModal(scenicSpots[randomIndex], cards[randomIndex]);
    });

    const intro = motion.timeline({ defaults: { ease: "power3.out" } });
    intro
      .from(".seal", { opacity: 0, y: 20, duration: 0.5 })
      .from("h1", { opacity: 0, y: 38, duration: 0.76 }, "-=0.22")
      .from(".hero-copy", { opacity: 0, y: 24, duration: 0.58 }, "-=0.42")
      .from(".hero-actions .btn", { opacity: 0, y: 18, stagger: 0.12, duration: 0.42 }, "-=0.28")
      .from(".bronze-ring", { opacity: 0, scale: 0.78, rotate: -24, duration: 0.8 }, "-=0.62")
      .from(".mascot", { opacity: 0, y: 34, scale: 0.92, duration: 0.72 }, "-=0.58");

    motion.to(".bronze-ring", {
      rotate: 360,
      duration: 28,
      repeat: -1,
      ease: "none"
    });

    motion.to(".mascot", {
      y: -14,
      duration: 2.8,
      yoyo: true,
      repeat: -1,
      ease: "sine.inOut"
    });

    motion.from(".spot-card", {
      opacity: 0,
      y: 36,
      rotateX: 8,
      stagger: 0.11,
      duration: 0.7,
      ease: "power3.out",
      delay: 0.38
    });
  </script>
</body>
</html>
